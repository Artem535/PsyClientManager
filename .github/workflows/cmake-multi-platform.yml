name: CI

on:
  push:
    branches: ["main", "devel", "devel-qt"]
  pull_request:
    branches: ["main", "devel", "devel-qt"]

permissions:
  contents: read

env:
  APPIMAGE_EXTRACT_AND_RUN: "1"
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives
  VCPKG_DOWNLOADS: ${{ github.workspace }}/vcpkg/downloads

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_version: 6.8.3
            artifact_name: PsyClientManager-linux-appimage
            qt_component: qt.qt6.683.linux_gcc_64
          - os: windows-latest
            qt_version: 6.8.3
            qt_arch: win64_msvc2022_64
            artifact_name: PsyClientManager-windows-deploy
            qt_host: windows
            qt_target: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            patchelf \
            file \
            wget \
            curl \
            libfuse2 \
            libgl1-mesa-dev \
            libglx-mesa0 \
            mesa-common-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxrender-dev \
            libxi-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libxkbcommon0 \
            libdbus-1-3

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Install Qt (Linux official installer)
        if: runner.os == 'Linux'
        env:
          QT_EMAIL: ${{ secrets.QT_EMAIL }}
          QT_PW: ${{ secrets.QT_PW }}
        run: |
          curl -L -O https://download.qt.io/official_releases/online_installers/qt-online-installer-linux-x64-online.run
          chmod +x qt-online-installer-linux-x64-online.run
          ./qt-online-installer-linux-x64-online.run \
            --root "${{ github.workspace }}/Qt" \
            --accept-licenses \
            --accept-obligations \
            --default-answer \
            --confirm-command \
            --email "$QT_EMAIL" \
            --pw "$QT_PW" \
            --auto-answer "OperationDoesNotExistError=Ignore,OverwriteTargetDirectory=No,stopProcessesForUpdates=Ignore,installationErrorWithCancel=Ignore,installationErrorWithIgnore=Ignore,AssociateCommonFiletypes=No,telemetry-question=No" \
            install "${{ matrix.qt_component }}"
          echo "Qt6_DIR=${{ github.workspace }}/Qt/${{ matrix.qt_version }}/gcc_64/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/${{ matrix.qt_version }}/gcc_64${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/Qt/${{ matrix.qt_version }}/gcc_64/bin" >> "$GITHUB_PATH"

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
            ${{ env.VCPKG_DOWNLOADS }}
          key: ${{ runner.os }}-vcpkg-bincache-${{ hashFiles('vcpkg.json') }}

      - name: Restore vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build-release/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg (Linux)
        if: runner.os != 'Windows'
        run: |
          if [ ! -d "${{ github.workspace }}/vcpkg/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "${{ github.workspace }}/vcpkg"
          fi
          "${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> "$GITHUB_ENV"

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "${{ github.workspace }}/vcpkg/.git")) {
            git clone https://github.com/microsoft/vcpkg "${{ github.workspace }}/vcpkg"
          }
          & "${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: cmake --preset vcpkg-release

      - name: Build
        run: cmake --build build-release --parallel

      - name: Test
        run: ctest --test-dir build-release --build-config MinSizeRel --output-on-failure

      - name: Install bundle
        if: runner.os != 'Windows'
        run: cmake --install build-release --config MinSizeRel --prefix build-release/install

      - name: Prepare Windows deploy directory
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-release/packages/PsyClientManager | Out-Null
          Copy-Item build-release/PsyClientManager.exe build-release/packages/PsyClientManager/

      - name: Run windeployqt
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $qtBin = Join-Path $env:Qt6_DIR "..\..\bin"
          $qtBin = [System.IO.Path]::GetFullPath($qtBin)
          & (Join-Path $qtBin "windeployqt.exe") `
            --release `
            --svg `
            --no-translations `
            --dir build-release/packages/PsyClientManager `
            build-release/packages/PsyClientManager/PsyClientManager.exe

      - name: Archive Windows deploy
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build-release/packages/PsyClientManager/* `
            -DestinationPath build-release/packages/PsyClientManager-windows.zip `
            -Force

      - name: Download linuxdeployqt
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Build AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p build-release/AppDir
          cmake --install build-release --config MinSizeRel --prefix build-release/AppDir/usr
          QT_PREFIX="${{ github.workspace }}/Qt/${{ matrix.qt_version }}/gcc_64"
          export PATH="$QT_PREFIX/bin:$PATH"
          export LD_LIBRARY_PATH="$QT_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          mkdir -p build-release/AppDir/usr/plugins/platforms
          cp -av "$QT_PREFIX/plugins/platforms/libqwayland.so" build-release/AppDir/usr/plugins/platforms/ || true
          cp -av "$QT_PREFIX/plugins/platforms/libqxcb.so" build-release/AppDir/usr/plugins/platforms/ || true
          ./linuxdeploy-x86_64.AppImage \
            --appdir build-release/AppDir \
            --executable build-release/AppDir/usr/bin/PsyClientManager \
            --desktop-file build-release/AppDir/usr/share/applications/PsyClientManager.desktop \
            --icon-file build-release/AppDir/usr/share/icons/hicolor/scalable/apps/PsyClientManager.svg \
            --plugin qt \
            --output appimage
          mkdir -p build-release/packages
          mv ./*.AppImage build-release/packages/

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build-release/packages/*
          if-no-files-found: error
